{% extends "base.html" %}
{% block title %}SafeCity — Create Incident{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Report New Incident</h1>
    <p class="page-subtitle">Submit a new public safety incident report</p>
</div>

<div class="card form-card">
    <form method="POST" action="{{ url_for('create_incident') }}" class="incident-form">
        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" required placeholder="Brief incident description">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3" placeholder="Detailed incident description"></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="severity">Severity *</label>
                <select id="severity" name="severity" required>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high" selected>High</option>
                    <option value="critical">Critical</option>
                </select>
            </div>
            <div class="form-group">
                <label for="incident_type">Type *</label>
                <select id="incident_type" name="incident_type" required>
                    <option value="crime">Crime</option>
                    <option value="fire">Fire</option>
                    <option value="traffic">Traffic</option>
                    <option value="medical">Medical</option>
                    <option value="infrastructure">Infrastructure</option>
                    <option value="cyber">Cyber</option>
                    <option value="environmental">Environmental</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" name="address" placeholder="Location address">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="zone">Zone</label>
                <input type="text" id="zone" name="zone" placeholder="e.g. Zone-4">
            </div>
            <div class="form-group">
                <label for="reporter">Reporter</label>
                <input type="text" id="reporter" name="reporter" placeholder="Your name or sensor ID">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="latitude">Latitude</label>
                <input type="number" id="latitude" name="latitude" step="0.0001" placeholder="19.0760">
            </div>
            <div class="form-group">
                <label for="longitude">Longitude</label>
                <input type="number" id="longitude" name="longitude" step="0.0001" placeholder="72.8777">
            </div>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('incidents_page') }}" class="btn btn-ghost">Cancel</a>
            <button type="submit" class="btn btn-primary">Submit Report</button>
        </div>
    </form>
</div>
{% endblock %}
