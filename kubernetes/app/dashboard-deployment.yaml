# ── SafeCity Dashboard — Deployment ──────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: safecity-dashboard
  namespace: safecity
  labels:
    app: safecity-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: safecity-dashboard
  template:
    metadata:
      labels:
        app: safecity-dashboard
    spec:
      containers:
        - name: dashboard
          image: SAFECITY_DASHBOARD_IMAGE  # Replaced by Jenkins pipeline
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: API_URL
              value: "http://safecity-api:8000"
            - name: SECRET_KEY
              value: "safecity-k8s-secret-key"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
      restartPolicy: Always
---
# ── SafeCity Dashboard — Service ─────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: safecity-dashboard
  namespace: safecity
  labels:
    app: safecity-dashboard
spec:
  type: NodePort
  selector:
    app: safecity-dashboard
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080
      name: http
