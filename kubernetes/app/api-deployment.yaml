# ── SafeCity API — Deployment ────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: safecity-api
  namespace: safecity
  labels:
    app: safecity-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: safecity-api
  template:
    metadata:
      labels:
        app: safecity-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: SAFECITY_API_IMAGE  # Replaced by Jenkins pipeline
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: safecity-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
