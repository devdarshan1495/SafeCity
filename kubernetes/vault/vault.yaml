# ── HashiCorp Vault — Dev Mode (with re-seed on restart) ────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      shareProcessNamespace: true
      containers:
        - name: vault
          image: hashicorp/vault:1.17
          args:
            - "server"
            - "-dev"
            - "-dev-root-token-id=safecity-root-token"
            - "-dev-listen-address=0.0.0.0:8200"
          ports:
            - containerPort: 8200
          env:
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: "safecity-root-token"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        - name: re-seed
          image: hashicorp/vault:1.17
          command: ["sh", "-c"]
          args:
            - |
              sleep 5
              while true; do
                if vault kv get secret/safecity/database >/dev/null 2>&1; then
                  sleep 60
                  continue
                fi
                echo "Secrets missing — re-seeding …"
                vault kv put secret/safecity/database \
                  username=safecity password=safecity_prod_pass \
                  host=postgres.safecity port=5432 dbname=safecity
                vault kv put secret/safecity/api \
                  jwt_secret=safecity-jwt-$(date +%s) \
                  api_key=sc-api-key-$(date +%s)
                vault kv put secret/safecity/redis \
                  url=redis://redis.safecity:6379/0
                echo "Re-seed complete."
                sleep 60
              done
          env:
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
            - name: VAULT_TOKEN
              value: "safecity-root-token"
          livenessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault
spec:
  type: NodePort
  selector:
    app: vault
  ports:
    - port: 8200
      targetPort: 8200
      nodePort: 30082
---
# ── Vault Init Job — Seeds secrets ──────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-seed
  namespace: vault
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-vault
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for Vault to be ready …"
              until wget -q --spider http://vault:8200/v1/sys/health 2>/dev/null; do
                sleep 3
              done
              echo "Vault is ready."
      containers:
        - name: seed
          image: hashicorp/vault:1.17
          env:
            - name: VAULT_ADDR
              value: "http://vault:8200"
            - name: VAULT_TOKEN
              value: "safecity-root-token"
          command: ["sh", "-c"]
          args:
            - |
              echo "Seeding Vault secrets …"

              vault kv put secret/safecity/database \
                username=safecity \
                password=safecity_prod_pass \
                host=postgres.safecity \
                port=5432 \
                dbname=safecity

              vault kv put secret/safecity/api \
                jwt_secret=safecity-jwt-$(date +%s) \
                api_key=sc-api-key-$(date +%s)

              vault kv put secret/safecity/redis \
                url=redis://redis.safecity:6379/0

              vault kv put secret/safecity/jenkins \
                admin_user=admin \
                admin_pass=safecity-jenkins

              echo "All secrets seeded successfully."
              vault kv list secret/safecity/
