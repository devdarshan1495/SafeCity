# ── SafeCity Local Dev Stack ──────────────────────────────────
# Runs: API + Dashboard + PostgreSQL + Redis
# Usage: docker compose up --build
# ─────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: safecity
      POSTGRES_USER: safecity
      POSTGRES_PASSWORD: safecity_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safecity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── SafeCity API ────────────────────────────────────────────
  api:
    build:
      context: ./app/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://safecity:safecity_dev_pass@postgres:5432/safecity
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── SafeCity Dashboard ──────────────────────────────────────
  dashboard:
    build:
      context: ./app/dashboard
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      API_URL: http://api:8000
      SECRET_KEY: safecity-local-dev-key
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
